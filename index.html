// ═══ SPRING FLIP ═══
function useSpringFlip() {
  const [rot, setRot] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const aRef = useRef(null),
    vRef = useRef(0);
  const flip = useCallback(() => {
    const nt = flipped ? 0 : 180;
    setFlipped(!flipped);
    const st = .08,
      dm = .72;
    let v = vRef.current,
      p = rot;
    const an = () => {
      v = (v + -st * (p - nt)) * dm;
      p += v;
      if (Math.abs(v) < .05 && Math.abs(p - nt) < .1) {
        setRot(nt);
        vRef.current = 0;
        return;
      }
      setRot(p);
      vRef.current = v;
      aRef.current = requestAnimationFrame(an);
    };
    if (aRef.current) cancelAnimationFrame(aRef.current);
    aRef.current = requestAnimationFrame(an);
  }, [flipped, rot]);
  return {
    rot,
    flipped,
    flip
  };
}
